{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">📊 My Dashboard</h2>

<!-- Summary Cards -->
<div class="row mb-4">
    <div class="col-md-4">
        <div class="card text-white bg-success">
            <div class="card-body">
                <h5 class="card-title">Total Income</h5>
                <h3>₦{{ "%.2f"|format(total_income) }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-danger">
            <div class="card-body">
                <h5 class="card-title">Total Expenses</h5>
                <h3>₦{{ "%.2f"|format(total_expenses) }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-primary">
            <div class="card-body">
                <h5 class="card-title">Balance</h5>
                <h3>₦{{ "%.2f"|format(balance) }}</h3>
            </div>
        </div>
    </div>
</div>

<!-- Pie Chart -->
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Spending by Category</h5>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const categoryLabels = {{ category_totals.keys()|list|tojson }};
    const categoryValues = {{ category_totals.values()|list|tojson }};

    new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
            labels: categoryLabels,
            datasets: [{
                data: categoryValues,
                backgroundColor: [
                    "#FF6384", "#36A2EB", "#FFCE56",
                    "#4BC0C0", "#9966FF", "#FF9F40"
                ]
            }]
        }
    });
</script>

{% endblock %}
