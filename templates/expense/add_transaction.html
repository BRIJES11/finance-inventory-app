<!DOCTYPE html>
<html>
<head>
    <title>Add Transaction</title>
</head>
<body>
    <h2>Add Transaction</h2>
    <form method="POST">
        <select name="account">
            <option value="personal">Personal</option>
            <option value="business">Business</option>
        </select><br><br>

        <select name="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select><br><br>

        <input type="text" name="category" placeholder="Category (e.g Food, Rent)" required><br><br>
        <input type="number" name="amount" placeholder="Amount" step="0.01" required><br><br>
        <input type="date" name="date" required><br><br>
        <input type="text" name="note" placeholder="Note (optional)"><br><br>

        <button type="submit">Add Transaction</button>
    </form>
    <a href="/expense/transactions">View Transactions</a>
</body>
</html>
