<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>
</head>
<body>
    <h2>My Transactions</h2>
    <a href="/expense/add">Add New Transaction</a><br><br>

    <form method="GET">
        <input type="month" name="month" placeholder="Filter by month">
        <input type="text" name="category" placeholder="Filter by category">
        <button type="submit">Filter</button>
        <a href="/expense/transactions">Clear</a>
    </form><br>

    <table border="1">
        <tr>
            <th>Date</th>
            <th>Account</th>
            <th>Type</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Note</th>
        </tr>
        {% for transaction in transactions %}
        <tr>
            <td>{{ transaction.date }}</td>
            <td>{{ transaction.account }}</td>
            <td>{{ transaction.type }}</td>
            <td>{{ transaction.category }}</td>
            <td>{{ transaction.amount }}</td>
            <td>{{ transaction.note }}</td>
            <td>
                <a href="/expense/edit/{{ transaction._id }}">Edit</a>
                <a href="/expense/delete/{{ transaction._id }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
