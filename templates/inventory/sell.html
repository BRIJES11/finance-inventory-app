{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title mb-4">🛒 Sell — {{ product.name }}</h3>
                <p class="text-muted">Current Stock: <strong>{{ product.quantity }}</strong></p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Quantity Sold</label>
                        <input type="number" name="quantity" class="form-control" placeholder="e.g 5" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Note (optional)</label>
                        <input type="text" name="note" class="form-control" placeholder="e.g Morning sales">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">- Sell Stock</button>
                    <a href="/inventory/products" class="btn btn-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
